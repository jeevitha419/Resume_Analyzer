<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">

    <style>
/* GLOBAL FIX: Prevent sidebar overlap on all pages */
body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
}

.main {
    margin-left: 260px !important; /* Ensures content moves right */
    padding: 30px;
}
</style>

    <link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">


    <style>
        body {
            font-family: "Segoe UI", sans-serif;
        }

        .main {
            margin-left: 260px;
            padding: 30px;
        }

        .settings-box {
            background: white;
            padding: 25px;
            width: 600px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            text-align: left;
        }

        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; }
        .btn-info { background: #0d6efd; color: white; }

        .msg {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

{% include "sidebar.html" %}

<div class="main">
    <h2>Settings</h2>
    <p>Manage system settings here.</p>

    <div class="settings-box">

        <button class="btn btn-info" onclick="clearHistory()">🗂 Clear Match History</button>
        <button class="btn btn-warning" onclick="clearUploads()">🧹 Clear Uploaded Resumes</button>
        <button class="btn btn-danger" onclick="resetAll()">⚠ Reset Entire System</button>

        <p class="msg" id="responseMsg"></p>

    </div>
</div>


<script>
    function clearHistory() {
        fetch("/clear-history", { method: "POST" })
            .then(() => document.getElementById("responseMsg").innerHTML = "✔ History cleared successfully!")
            .catch(() => alert("Error clearing history"));
    }

    function clearUploads() {
        fetch("/clear-uploads", { method: "POST" })
            .then(() => document.getElementById("responseMsg").innerHTML = "✔ All uploads deleted!")
            .catch(() => alert("Error clearing uploads"));
    }

    function resetAll() {
        if (!confirm("Are you sure? This will delete all data!")) return;

        fetch("/reset-system", { method: "POST" })
            .then(() => document.getElementById("responseMsg").innerHTML = "✔ System fully reset!")
            .catch(() => alert("Error resetting system"));
    }
</script>

</body>
</html>
